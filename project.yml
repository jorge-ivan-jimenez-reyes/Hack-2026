name: HackNacional2026

options:
  bundleIdPrefix: mx.up.ioslab
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: es
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_MODULE_VERIFIER: YES
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_UPCOMING_FEATURE_INTERNAL_IMPORTS_BY_DEFAULT: NO

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-spm
    from: "4.5.0"

targets:
  HackNacional2026:
    type: application
    platform: iOS
    deploymentTarget: "26.0"

    dependencies:
      - package: Lottie
        product: Lottie

    sources:
      - path: App
        excludes:
          - "**/*.md"
      - path: Core
        excludes:
          - "**/*.md"
      - path: Features
        excludes:
          - "**/*.md"

    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/Lottie
        excludes:
          - "**/*.md"

    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: HackNacional 2026
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSCameraUsageDescription: Para escanear residuos y clasificarlos.
        NSPhotoLibraryAddUsageDescription: Para guardar capturas de tus escaneos.
        NSSpeechRecognitionUsageDescription: Para input por voz cuando se active.
        UILaunchScreen:
          UIColorName: surface
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: mx.up.ioslab.hacknacional2026
        PRODUCT_NAME: $(TARGET_NAME)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO

schemes:
  HackNacional2026:
    build:
      targets:
        HackNacional2026: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
